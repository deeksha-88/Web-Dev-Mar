<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .Box{
            background-color: blueviolet;
            height: 100px;
            width: 100px;
            color: white;
            margin: auto;

            transition: 3s;
            /* transition: ; Time   */

        }
/* 
        Hover - When we Move Our Mouse and It Changes the Style */

        #Magic:hover{
          /* transform: scale(1.3);    */
          /* scale(1-Original.Change of size value)  It is used to change the size of tag*/
          background-color: red;

          /* transform: rotate(360deg); */

          /* transform: rotateX(360deg); */

          /* transform: rotateY(360deg); */
/* 
          transform: translateX(100px) */
          
            transform: translateY(100px)
          
        }

        
    </style>
</head>
<body>
    <div class="Box" id="Magic">
        Box
    </div>
</body>
</html>
