<body>
    <script>
    //Math Object - Random No Between 1 to 6

        let luckyNo  =   Math.floor( Math.random() * 6) + 1

    //    console.log(luckyNo)

    //game Logic

    while(true){

       guess =   prompt('Enter Number Between 1 to 6')


       if(luckyNo == guess){


        alert('You Won ')
        break;           //Stop or To Break The code - Come Out of Loop

       }else{
           
        alert('Better Luck Next Time')

       }



    }



    </script>
