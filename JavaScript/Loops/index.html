<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Loop should Ending Everything

        //Task - Print Numbers 1 to 100 In console

        console.log(1)
        console.log(2)
        console.log(3)
        console.log(4)
       // ......

       //for loop
       //for(starting point;ending/Condition Point; Increment = ++ / Decrement = -- )  - keyword

       //Task prnt 1 to 10
       for(let i = 1;  i<=10; i++ ){
        //Repeated Task 

          console.log("The Value of i "  + i)

       }

       //While Loop - Entry Controlled Loop

     //  while(condition)  - When condition is True loops start and When Condition become False Loop Stooped
     
     let count = 1

     while(count<=5){
        console.log("Hii I am While Loop")
        count++
     }

     //Do While Loop - Exit Controlled Loop
     //It will execute / run the code atleast 1 time- even toh condition is false
     let number = 6

     do{
                 console.log('Hello How are you?')

     }while(number<=5)
    </script>
</body>
</html>
