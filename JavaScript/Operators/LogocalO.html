<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
     // AND - && - IF BOTH CONDITION IS TRUE THEN OUTPUT TRUE

     var isMember = true
     let TotalPrice = 300

     console.log(isMember  &&  TotalPrice > 200)

       
     //OR - || If Only one Condition is True then Output is True

     
     console.log(isMember  ||  TotalPrice > 500)

     // Negation - ! : Opposite Value
     let netflixSub = false

     console.log(!netflixSub)


     //comparison - Two value

     const a = 10 
     const b = "10"

     //== Comapre Value - Both Value are same Output is True
     console.log(a == b)  //True

     // === Comapre Value and Data Types - Both Are Same Output is True
     console.log(a===b)   //False
    </script>
</body>
</html>
