    <script>
        //Variable - It is used to store the data
        //Trick - "Text Format Data" or ''
        //        Number Format Data Write Directly


        //1. keyword - var 
        //Synax VariableType VariableName = Value

        var username = "Prashant"
        console.log(username)


        var age = 22
        console.log(age)

        //DisAdvantage of var keyword - It Allows using same  Variable Name and Updates the Pervious Value

        var phoneno = 12345678

        var phoneno = 89676

        console.log(phoneno)
        


      //2. Keyword - let 

      let email = "abc@gmail.com"

     // let email = "xyz@gmail.com" - Throw Error Bcz using same variblname that is email along with let

      console.log(email)

     
      //Disadvatange- If you used the same variableName without using let keyword it will update the value

      let review = 4.5

       review = 2.5

      console.log(review)


      //3. keyword - const  means constant - fixed


      const abc = "Hello Guys"


      console.log(abc)





    </script>
