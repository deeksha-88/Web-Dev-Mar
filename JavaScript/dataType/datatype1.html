<body>
    <h1>Data Types in JavaScript</h1>


    <script>
            
            //Data Type - Types of Data

            //1. String = Text -  "Anything Inside doule or single quotes" or ''
            var username = 'John1234'
            console.log(username)
            //Check The Data Type of any Value - typeof(VariableName)

            console.log(typeof(username)) 


            //2.Number : +ve , -Ve , DecimalNumber Every Number is a Number Data Type
            //Write Number Directly
              
            var age = -34.00

            console.log( typeof(age)    )


            //Boolean - When The Value is in true or false
            var isSubscribed = false

            var isLoggedIn = "true"

            console.log( typeof(isLoggedIn) )


            //4. Undefiend - When No Value is assigned
            var a
            console.log(typeof(a))


            //5. Null- Nothing
            var b = null
            console.log( typeof(b) )



     </script>
